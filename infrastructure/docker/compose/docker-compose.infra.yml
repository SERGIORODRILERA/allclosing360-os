services:
  postgres:
    image: postgres:16-alpine
    container_name: ac360_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ac360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ac360dev}
      POSTGRES_DB: ${POSTGRES_DB:-ac360_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ac360}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ac360_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ac360dev}
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-ac360dev}",
          "ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: ac360_nats
    # -js enables JetStream; -m exposes the HTTP monitoring endpoint
    command: ["-js", "-m", "8222", "--name", "ac360-nats"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:
